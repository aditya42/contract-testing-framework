name: Contract Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run consumer and provider contract tests
        env:
          PACT_DO_NOT_TRACK: "1"
        run: make contract-test

      - name: Upload Pact contracts and reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-test-artifacts
          path: |
            pacts/
            reports/
          if-no-files-found: warn
          retention-days: 14
